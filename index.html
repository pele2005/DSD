<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Sales Dashboard (DSD)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================== VARIABLES ============================== */
:root {
  --pri:       #1565C0;
  --pri-dark:  #0D47A1;
  --pri-light: #E3F2FD;
  --acc:       #0288D1;
  --green:     #2E7D32;
  --red:       #C62828;
  --text:      #212121;
  --text2:     #616161;
  --border:    #E0E0E0;
  --bg:        #F5F5F5;
  --white:     #FFFFFF;
  --shadow:    0 2px 8px rgba(0,0,0,.12);
  --r:         8px;
  --font:      'Sarabun', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* ============================== LOGIN ============================== */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1565C0 0%, #0D47A1 60%, #1976D2 100%);
  padding: 20px;
}
.login-card {
  background: #fff;
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,.28);
}
.login-brand {
  text-align: center;
  margin-bottom: 32px;
}
.login-brand .brand-icon {
  font-size: 48px;
  margin-bottom: 10px;
}
.login-brand h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--pri);
  margin-bottom: 4px;
}
.login-brand p {
  color: var(--text2);
  font-size: 13px;
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text);
  font-size: 13px;
}
.form-group input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  font-family: var(--font);
  font-size: 14px;
  transition: all .2s;
  outline: none;
  background: #fff;
}
.form-group input:focus {
  border-color: var(--pri);
  box-shadow: 0 0 0 3px rgba(21,101,192,.12);
}
.login-err {
  display: none;
  color: var(--red);
  font-size: 13px;
  background: #FFEBEE;
  border: 1px solid #FFCDD2;
  border-radius: 6px;
  padding: 9px 12px;
  margin-bottom: 12px;
}
.btn-login {
  width: 100%;
  padding: 13px;
  background: var(--pri);
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .3px;
}
.btn-login:hover:not(:disabled) { background: var(--pri-dark); }
.btn-login:disabled { opacity: .65; cursor: default; }

/* ============================== DASHBOARD ============================== */
#dashboard { display: none; flex-direction: column; min-height: 100vh; }

/* Header */
.app-header {
  background: var(--pri);
  color: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shadow);
  gap: 10px;
}
.header-title { font-size: 15px; font-weight: 700; white-space: nowrap; }
.header-title small {
  display: block;
  font-size: 10px;
  font-weight: 400;
  opacity: .75;
  margin-top: 1px;
}
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.user-badge {
  background: rgba(255,255,255,.2);
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.btn-out {
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.4);
  color: #fff;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
  white-space: nowrap;
  transition: all .2s;
}
.btn-out:hover { background: rgba(255,255,255,.3); }

/* Controls bar */
.controls-bar {
  background: #fff;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}
.mode-toggle {
  display: flex;
  background: var(--bg);
  border-radius: 6px;
  padding: 2px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.mode-btn {
  padding: 5px 14px;
  border: none;
  background: transparent;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  transition: all .2s;
  white-space: nowrap;
}
.mode-btn.active {
  background: var(--pri);
  color: #fff;
  box-shadow: 0 1px 4px rgba(21,101,192,.35);
}
.date-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
  min-width: 180px;
}
.nav-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 6px 13px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  color: var(--pri);
  transition: all .2s;
  flex-shrink: 0;
}
.nav-btn:hover { background: var(--pri-light); border-color: var(--pri); }
.date-display {
  flex: 1;
  text-align: center;
  font-weight: 600;
  font-size: 14px;
  color: var(--pri);
  background: var(--pri-light);
  padding: 6px 10px;
  border-radius: 6px;
  white-space: nowrap;
  min-width: 120px;
}
.btn-today {
  background: var(--acc);
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 600;
  white-space: nowrap;
  transition: filter .2s;
  flex-shrink: 0;
}
.btn-today:hover { filter: brightness(1.12); }
.btn-reload {
  background: #7B1FA2;
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: var(--font);
  font-weight: 600;
  white-space: nowrap;
  transition: filter .2s;
  flex-shrink: 0;
}
.btn-reload:hover { filter: brightness(1.12); }

/* Search bar */
.search-bar {
  background: #fff;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 7px;
  align-items: center;
  flex-wrap: wrap;
}
.search-inp {
  flex: 1;
  min-width: 140px;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: all .2s;
}
.search-inp:focus {
  border-color: var(--pri);
  box-shadow: 0 0 0 2px rgba(21,101,192,.1);
}
.btn-clear {
  background: #FFEBEE;
  border: 1px solid #FFCDD2;
  color: var(--red);
  padding: 7px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font);
  font-weight: 600;
  transition: all .2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-clear:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* Summary row */
.summary-bar {
  background: #fff;
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.chip {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  background: var(--pri-light);
  border: 1px solid #90CAF9;
  color: var(--pri-dark);
}
.chip.grn { background: #E8F5E9; border-color: #A5D6A7; color: var(--green); }
.rec-count { margin-left: auto; color: var(--text2); font-size: 12px; white-space: nowrap; }

/* Table */
.table-section { flex: 1; }
.table-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 260px);
  -webkit-overflow-scrolling: touch;
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: #fff;
  min-width: 720px;
}
.data-table thead th {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--pri);
  color: #fff;
  padding: 10px 11px;
  text-align: left;
  font-weight: 600;
  white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,.15);
}
.data-table thead th:last-child { border-right: none; }
.data-table thead th.r { text-align: right; }
.data-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.data-table tbody tr:nth-child(even) { background: #FAFAFA; }
.data-table tbody tr:hover { background: var(--pri-light) !important; }
.data-table td {
  padding: 8px 11px;
  vertical-align: middle;
}
.data-table td.r {
  text-align: right;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.data-table td.trunc {
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.date-grp-row td {
  background: #E3F2FD !important;
  font-weight: 700;
  color: var(--pri-dark);
  font-size: 12px;
  letter-spacing: .4px;
  padding: 5px 11px;
  border-bottom: 1px solid #BBDEFB;
}
.data-table tfoot tr { background: var(--pri-dark) !important; }
.data-table tfoot td {
  padding: 10px 11px;
  font-weight: 700;
  color: #fff;
  border: none;
  white-space: nowrap;
}
.data-table tfoot td.r { text-align: right; }

/* State panels */
.state-panel {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
  background: #fff;
}
.state-panel .icon { font-size: 44px; margin-bottom: 12px; }
.state-panel p { font-size: 14px; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--pri);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed;
  bottom: 20px; right: 20px;
  background: #323232;
  color: #fff;
  padding: 11px 18px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: all .3s;
  pointer-events: none;
  max-width: 300px;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ============================== RESPONSIVE ============================== */
@media (max-width: 600px) {
  .login-card { padding: 28px 20px; }
  .controls-bar { flex-direction: column; align-items: stretch; }
  .date-nav { min-width: auto; }
  .app-header { padding: 8px 12px; }
  .header-title { font-size: 13px; }
  .data-table { font-size: 12px; }
  .data-table td, .data-table th { padding: 7px 8px; }
  .search-bar { flex-wrap: nowrap; }
  .search-inp { min-width: 110px; }
  .summary-bar { gap: 6px; }
  .chip { font-size: 11px; padding: 3px 9px; }
}
</style>
</head>
<body>

<!-- ======================================================== LOGIN ======================================================== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">📊</div>
      <h1>Daily Sales Dashboard</h1>
      <p>TRB Chemedica International</p>
    </div>
    <div class="form-group">
      <label>Username (Cost Center)</label>
      <input type="text" id="inpUser" placeholder="เช่น 1BA, 1BB …"
             autocomplete="username" style="text-transform:uppercase"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="inpPass" placeholder="กรอก Password"
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- ======================================================== DASHBOARD ======================================================== -->
<div id="dashboard">

  <!-- Header -->
  <header class="app-header">
    <div class="header-title">
      📊 Daily Sales Dashboard
      <small>TRB Chemedica</small>
    </div>
    <div class="header-right">
      <span class="user-badge" id="userBadge">—</span>
      <button class="btn-out" onclick="doLogout()">ออกจากระบบ</button>
    </div>
  </header>

  <!-- Controls -->
  <div class="controls-bar">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnDay"   onclick="setMode('day')">รายวัน</button>
      <button class="mode-btn"        id="btnMonth" onclick="setMode('month')">ทั้งเดือน</button>
    </div>
    <div class="date-nav">
      <button class="nav-btn" onclick="nav(-1)">&#9664;</button>
      <span class="date-display" id="dateDisp">—</span>
      <button class="nav-btn" onclick="nav(1)">&#9654;</button>
    </div>
    <button class="btn-today"  onclick="goToday()">วันนี้</button>
    <button class="btn-reload" onclick="reloadData()">🔄 โหลดใหม่</button>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input class="search-inp" id="sProd" type="text"
           placeholder="🔍 ค้นหา ชื่อสินค้า …" oninput="applyFilter()">
    <input class="search-inp" id="sCust" type="text"
           placeholder="🔍 ค้นหา ชื่อลูกค้า …" oninput="applyFilter()">
    <button class="btn-clear" onclick="clearSearch()">✕ ล้าง</button>
  </div>

  <!-- Summary chips -->
  <div class="summary-bar">
    <span class="chip"     id="chQty">Qty: —</span>
    <span class="chip grn" id="chAmt">Amount: —</span>
    <span class="chip"     id="chFoc">F.O.C: —</span>
    <span class="chip"     id="chFoc2">F.O.C2: —</span>
    <span class="chip"     id="chBorr">Borrow: —</span>
    <span class="rec-count" id="recCount"></span>
  </div>

  <!-- Table area -->
  <div class="table-section">

    <!-- Loading -->
    <div id="stateLoad" class="state-panel">
      <div class="spinner"></div>
      <p>กำลังโหลดข้อมูล …</p>
    </div>

    <!-- Empty -->
    <div id="stateEmpty" class="state-panel" style="display:none">
      <div class="icon">📭</div>
      <p id="emptyMsg">ไม่พบข้อมูลในช่วงเวลาที่เลือก</p>
    </div>

    <!-- Table -->
    <div class="table-wrap" id="tableWrap" style="display:none">
      <table class="data-table">
        <thead>
          <tr>
            <th>วันที่</th>
            <th>เลขที่ใบแจ้งหนี้</th>
            <th>Rep</th>
            <th>ลูกค้า</th>
            <th>สินค้า</th>
            <th class="r">Qty</th>
            <th class="r">Amount</th>
            <th class="r">F.O.C</th>
            <th class="r">F.O.C2</th>
            <th class="r">Borrow</th>
          </tr>
        </thead>
        <tbody id="tBody"></tbody>
        <tfoot id="tFoot"></tfoot>
      </table>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ======================================================== SCRIPT ======================================================== -->
<script>
/* ================================================================
   CONFIGURATION
   แก้ไข Sheet IDs และ column indices ให้ตรงกับ Google Sheet จริง
================================================================ */
var CFG = {
  // ---- Google Sheet IDs ----
  DATA_ID:  '1WVwsQMBDA3JPcvGWoCFkr8zZ3dBQC4bWgDMgxpzVi3c',
  USERS_ID: '1E-1fKvOG2Yd88RM3WmTAKEzB-Ve1uBuFyDXKGc-ehXY',
  PERM_ID:  '1LXyGjplIU6WZPF-0Ty10aOO_Dl2Kq_lO7EqdhjtZl80',

  // ---- Sheet / Tab names ----
  DATA_TAB:  'DATA',
  USERS_TAB: 'pass',
  PERM_TAB:  'permission',

  /* ---- Column indices in the DATA tab (0 = column A) ----
     ปรับค่าเหล่านี้ให้ตรงกับโครงสร้าง Excel ที่ export จาก SIS4
     (row แรกของ DATA tab ต้องเป็น header row)
     ตัวอย่างโครงสร้างที่คาดไว้:
       A(0)=Date  B(1)=Rep  C(2)=Customer  D(3)=Product Item  E(4)=Invoice
       F(5)=Qty   G(6)=Amount  H(7)=F.O.C  I(8)=F.O.C2  J(9)=Borrow
  */
  C: {
    DATE:     0,
    REP:      1,
    CUSTOMER: 2,
    PRODUCT:  3,
    INVOICE:  4,
    QTY:      5,
    AMOUNT:   6,
    FOC:      7,
    FOC2:     8,
    BORROW:   9
  }
};

/* ================================================================
   STATE
================================================================ */
var S = {
  users:   [],   // [{u:'1BA', p:'23061985'}, …]
  perms:   {},   // {'1BA':['1BA'], 'ADMIN':['1BA','1BB',…], …}
  raw:     [],   // all parsed rows from DATA tab
  view:    [],   // filtered rows shown in table
  user:    null,
  mode:    'day',       // 'day' | 'month'
  date:    new Date(),  // current navigation date
  loaded:  false
};

/* ================================================================
   GOOGLE SHEETS – gviz/tq fetcher
   หมายเหตุ: Sheet ทั้ง 3 ต้องตั้ง sharing เป็น
   "Anyone with the link → Viewer" จึงจะทำงานได้
================================================================ */
function fetchSheet(sheetId, tabName) {
  var url = 'https://docs.google.com/spreadsheets/d/' + sheetId
          + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(tabName)
          + '&t=' + Date.now();
  return fetch(url, {cache:'no-store'})
    .then(function(r){ return r.text(); })
    .then(function(txt){
      // Strip JSONP wrapper: google.visualization.Query.setResponse({…});
      var m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
      if (!m) throw new Error('Sheet "' + tabName + '": invalid response');
      var obj = JSON.parse(m[1]);
      if (obj.status === 'error') {
        var msg = (obj.errors && obj.errors[0]) ? obj.errors[0].message : 'Sheet error';
        throw new Error('Sheet "' + tabName + '": ' + msg);
      }
      return parseTable(obj.table);
    });
}

/* Convert gviz table object → array of arrays */
function parseTable(table) {
  if (!table || !table.rows) return [];
  return table.rows.map(function(row){
    return (row.c || []).map(function(cell){
      if (!cell || cell.v === null || cell.v === undefined) return '';
      // Google date: "Date(2026,3,1)" → JS Date (month is 0-based)
      if (typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
        var parts = cell.v.slice(5,-1).split(',').map(Number);
        return new Date(parts[0], parts[1], parts[2]);
      }
      return cell.v;
    });
  }).filter(function(r){ return r.some(function(v){ return v !== '' && v !== null; }); });
}

/* ================================================================
   LOGIN
================================================================ */
function doLogin() {
  var u  = el('inpUser').value.trim().toUpperCase();
  var p  = el('inpPass').value.trim();
  var eb = el('loginErr');
  var bt = el('btnLogin');

  if (!u || !p) { showLoginErr('กรุณากรอก Username และ Password'); return; }

  bt.disabled = true;
  bt.textContent = 'กำลังตรวจสอบ …';
  eb.style.display = 'none';

  var loadUsers = S.users.length > 0
    ? Promise.resolve()
    : fetchSheet(CFG.USERS_ID, CFG.USERS_TAB).then(function(rows){
        S.users = rows.map(function(r){
          return { u: String(r[0]||'').trim().toUpperCase(),
                   p: String(r[1]||'').trim() };
        });
      });

  loadUsers
    .then(function(){
      var found = S.users.find(function(x){ return x.u === u && x.p === p; });
      if (!found) {
        showLoginErr('Username หรือ Password ไม่ถูกต้อง');
        bt.disabled = false; bt.textContent = 'เข้าสู่ระบบ';
        return Promise.reject('invalid');
      }
      return fetchSheet(CFG.PERM_ID, CFG.PERM_TAB);
    })
    .then(function(pRows){
      S.perms = {};
      pRows.forEach(function(r){
        var cc = String(r[0]||'').trim().toUpperCase();
        var ps = r.slice(1).map(function(v){ return String(v||'').trim().toUpperCase(); })
                            .filter(function(v){ return v; });
        S.perms[cc] = ps;
      });
      S.user = u;
      sessionStorage.setItem('dsd_u', u);

      el('loginScreen').style.display  = 'none';
      el('dashboard').style.display    = 'flex';
      el('dashboard').style.flexDirection = 'column';
      el('userBadge').textContent = u;

      S.date   = new Date();
      S.mode   = 'day';
      updateDateDisp();
      return loadData();
    })
    .catch(function(e){
      if (e === 'invalid') return;
      showLoginErr('ไม่สามารถเชื่อมต่อ Google Sheet ได้ กรุณาตรวจสอบการตั้งค่า Sharing');
      console.error(e);
      bt.disabled = false; bt.textContent = 'เข้าสู่ระบบ';
    });
}

function showLoginErr(msg) {
  var e = el('loginErr');
  e.textContent = msg;
  e.style.display = 'block';
}

function doLogout() {
  sessionStorage.removeItem('dsd_u');
  S.user = null; S.raw = []; S.loaded = false;
  el('dashboard').style.display    = 'none';
  el('loginScreen').style.display  = 'flex';
  el('inpPass').value = '';
  el('loginErr').style.display = 'none';
}

/* ================================================================
   DATA LOAD
================================================================ */
function loadData() {
  showState('load');
  return fetchSheet(CFG.DATA_ID, CFG.DATA_TAB)
    .then(function(rows){
      var C = CFG.C;
      S.raw = rows.map(function(r){
        var d = r[C.DATE];
        if (typeof d === 'string') d = new Date(d);
        return {
          date:     (d instanceof Date && !isNaN(d)) ? d : null,
          rep:      String(r[C.REP]||'').trim().toUpperCase(),
          customer: String(r[C.CUSTOMER]||'').trim(),
          product:  String(r[C.PRODUCT]||'').trim(),
          invoice:  String(r[C.INVOICE]||'').trim(),
          qty:      +r[C.QTY]    || 0,
          amount:   +r[C.AMOUNT] || 0,
          foc:      +r[C.FOC]    || 0,
          foc2:     +r[C.FOC2]   || 0,
          borrow:   +r[C.BORROW] || 0
        };
      }).filter(function(r){ return r.date !== null; });

      S.loaded = true;
      toast('โหลดข้อมูลสำเร็จ ' + S.raw.length + ' รายการ');
      applyFilter();
    })
    .catch(function(e){
      console.error(e);
      showState('empty', '⚠️ ไม่สามารถโหลดข้อมูลได้<br><small>กรุณาตรวจสอบ Sheet "' + CFG.DATA_TAB + '" และการตั้งค่า Sharing</small>');
    });
}

function reloadData() {
  S.loaded = false;
  toast('กำลังโหลดข้อมูลใหม่ …');
  loadData();
}

/* ================================================================
   FILTER & RENDER
================================================================ */
function applyFilter() {
  if (!S.loaded) return;

  var perms = S.perms[S.user] || [S.user];
  var sp = el('sProd').value.trim().toLowerCase();
  var sc = el('sCust').value.trim().toLowerCase();
  var d  = S.date;

  S.view = S.raw.filter(function(r){
    // Permission
    if (perms.length && !perms.includes(r.rep)) return false;
    // Date
    if (!r.date) return false;
    if (S.mode === 'day') {
      if (r.date.getFullYear() !== d.getFullYear() ||
          r.date.getMonth()    !== d.getMonth()    ||
          r.date.getDate()     !== d.getDate()) return false;
    } else {
      if (r.date.getFullYear() !== d.getFullYear() ||
          r.date.getMonth()    !== d.getMonth()) return false;
    }
    // Search
    if (sp && !r.product.toLowerCase().includes(sp)) return false;
    if (sc && !r.customer.toLowerCase().includes(sc)) return false;
    return true;
  });

  // Sort: Date → Invoice → Customer → Product
  S.view.sort(function(a,b){
    if (a.date - b.date) return a.date - b.date;
    if (a.invoice < b.invoice) return -1;
    if (a.invoice > b.invoice) return  1;
    if (a.customer < b.customer) return -1;
    if (a.customer > b.customer) return  1;
    if (a.product < b.product) return -1;
    if (a.product > b.product) return  1;
    return 0;
  });

  renderTable();
  renderSummary();
}

function clearSearch() {
  el('sProd').value = '';
  el('sCust').value = '';
  applyFilter();
}

function renderTable() {
  if (S.view.length === 0) { showState('empty'); return; }
  showState('table');

  var html = '';
  var lastDateStr = null;

  S.view.forEach(function(r){
    var ds = fmtDate(r.date);
    if (S.mode === 'month' && ds !== lastDateStr) {
      html += '<tr class="date-grp-row"><td colspan="10">📅 ' + esc(ds) + '</td></tr>';
      lastDateStr = ds;
    }
    html += '<tr>'
      + '<td>' + esc(ds) + '</td>'
      + '<td>' + esc(r.invoice) + '</td>'
      + '<td class="trunc" title="' + esc(r.rep) + '">' + esc(r.rep) + '</td>'
      + '<td class="trunc" title="' + esc(r.customer) + '">' + esc(r.customer) + '</td>'
      + '<td class="trunc" title="' + esc(r.product) + '">' + esc(r.product) + '</td>'
      + '<td class="r">' + fmtN(r.qty,   0) + '</td>'
      + '<td class="r">' + fmtN(r.amount, 2) + '</td>'
      + '<td class="r">' + fmtN(r.foc,   0) + '</td>'
      + '<td class="r">' + fmtN(r.foc2,  0) + '</td>'
      + '<td class="r">' + fmtN(r.borrow,0) + '</td>'
      + '</tr>';
  });
  el('tBody').innerHTML = html;

  // Footer totals
  var T = S.view.reduce(function(a,r){
    a.qty+=r.qty; a.amount+=r.amount;
    a.foc+=r.foc; a.foc2+=r.foc2; a.borrow+=r.borrow;
    return a;
  }, {qty:0,amount:0,foc:0,foc2:0,borrow:0});

  el('tFoot').innerHTML = '<tr>'
    + '<td colspan="5">รวมทั้งหมด (' + S.view.length + ' รายการ)</td>'
    + '<td class="r">' + fmtN(T.qty,   0) + '</td>'
    + '<td class="r">' + fmtN(T.amount, 2) + '</td>'
    + '<td class="r">' + fmtN(T.foc,   0) + '</td>'
    + '<td class="r">' + fmtN(T.foc2,  0) + '</td>'
    + '<td class="r">' + fmtN(T.borrow,0) + '</td>'
    + '</tr>';
}

function renderSummary() {
  var v = S.view;
  var T = v.reduce(function(a,r){
    a.qty+=r.qty; a.amount+=r.amount;
    a.foc+=r.foc; a.foc2+=r.foc2; a.borrow+=r.borrow;
    return a;
  }, {qty:0,amount:0,foc:0,foc2:0,borrow:0});
  el('chQty').textContent   = 'Qty: '     + fmtN(T.qty,   0);
  el('chAmt').textContent   = 'Amount: '  + fmtN(T.amount, 2);
  el('chFoc').textContent   = 'F.O.C: '   + fmtN(T.foc,   0);
  el('chFoc2').textContent  = 'F.O.C2: '  + fmtN(T.foc2,  0);
  el('chBorr').textContent  = 'Borrow: '  + fmtN(T.borrow,0);
  el('recCount').textContent = v.length + ' รายการ';
}

/* ================================================================
   DATE NAVIGATION
================================================================ */
function setMode(m) {
  S.mode = m;
  el('btnDay')  .classList.toggle('active', m === 'day');
  el('btnMonth').classList.toggle('active', m === 'month');
  updateDateDisp();
  applyFilter();
}

function nav(delta) {
  var d = S.date;
  if (S.mode === 'day')
    S.date = new Date(d.getFullYear(), d.getMonth(), d.getDate() + delta);
  else
    S.date = new Date(d.getFullYear(), d.getMonth() + delta, 1);
  updateDateDisp();
  applyFilter();
}

function goToday() {
  S.date = new Date();
  updateDateDisp();
  applyFilter();
}

function updateDateDisp() {
  var d = S.date;
  var MO = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.',
            'ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var txt = S.mode === 'day'
    ? pad(d.getDate()) + ' ' + MO[d.getMonth()] + ' ' + (d.getFullYear()+543)
    : MO[d.getMonth()] + ' ' + (d.getFullYear()+543);
  el('dateDisp').textContent = txt;
}

/* ================================================================
   UI HELPERS
================================================================ */
function showState(s, msg) {
  el('stateLoad') .style.display = s === 'load'  ? 'block' : 'none';
  el('stateEmpty').style.display = s === 'empty' ? 'block' : 'none';
  el('tableWrap') .style.display = s === 'table' ? 'block' : 'none';
  if (s === 'empty' && msg) el('emptyMsg').innerHTML = msg;
  else if (s === 'empty')  el('emptyMsg').textContent = 'ไม่พบข้อมูลในช่วงเวลาที่เลือก';
}

var MO_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.',
             'ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function fmtDate(d) {
  if (!d) return '';
  return pad(d.getDate()) + '/' + pad(d.getMonth()+1) + '/' + (d.getFullYear()+543);
}
function fmtN(n, dec) {
  if (n === 0) return dec === 0 ? '0' : '0.00';
  return Number(n).toLocaleString('th-TH',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function pad(n){ return n < 10 ? '0'+n : ''+n; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function el(id){ return document.getElementById(id); }

var _toastTimer;
function toast(msg) {
  var t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
